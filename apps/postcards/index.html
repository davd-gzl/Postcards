<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <!-- Content-Security-Policy — the ONE control the "token stays on device"
         promise rests on. The GitHub sync token lives in this origin's
         localStorage; the crucial defence is a strict `connect-src` (+ img-src,
         object-src 'none', form-action 'none'): an injected or dependency-borne
         script cannot POST the token to any host but the few the app legitimately
         talks to, nor smuggle it out via an <img>, form or <object>. Delivered as
         a meta because GitHub Pages sends no headers and the Capacitor WebView
         never sees them for the bundled index.html — the only portable channel.
         script-src keeps 'unsafe-inline' ONLY because the Publish PREVIEW renders
         the generated reader in a `sandbox="allow-scripts"` srcdoc iframe, which
         inherits this policy and is all inline script; that frame has an opaque
         origin and cannot read this origin's token, and static hosting offers no
         per-request nonce, so 'unsafe-inline' here does not widen the credential's
         blast radius — the connect-src backstop still contains any exfiltration.
         NOTE: `frame-ancestors`/`sandbox` are ignored in a meta CSP, so there is
         no clickjacking protection on a header-less static host (a non-issue on
         native). connect-src omits self-hosted GitHub Enterprise apiBase hosts;
         those users must serve the app with their own header-based CSP. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               base-uri 'none';
               object-src 'none';
               form-action 'none';
               frame-ancestors 'none';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline';
               worker-src 'self' blob:;
               img-src 'self' data: blob: https://tile.openstreetmap.org https://upload.wikimedia.org;
               connect-src 'self' https://api.github.com https://tile.openstreetmap.org https://upload.wikimedia.org https://*.wikipedia.org https://*.wikivoyage.org;
               frame-src 'self';
               manifest-src 'self'"
    />
    <!-- Send our ORIGIN (not the URL) as the Referer on cross-origin requests so
         the opt-in OpenStreetMap tile server accepts them ("Referer is required").
         This meta is the only referrer channel that reaches the Vite dev/preview
         server and the Capacitor native webview. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Startup fetches otherwise wait for the whole bundle to download and
         evaluate: preload the render-blocking reference JSONs (and the basemap
         geometry the map needs right after) so the network runs in parallel.
         %BASE_URL% matches the import.meta.env.BASE_URL the code fetches with;
         `crossorigin` (anonymous) matches fetch()'s default credentials mode so
         the preloaded response is consumed, not downloaded twice. On repeat
         visits these resolve from the service-worker cache and cost nothing. -->
    <link rel="preload" href="%BASE_URL%reference/cities.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%reference/airports.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%reference/subdivisions.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%reference/heritage.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%basemap/countries-50m.json" as="fetch" crossorigin />
    <meta name="theme-color" content="#4338ca" />
    <meta name="description" content="Remember the places you've been — private, offline, in a file you own." />
    <title>Postcards</title>
    <!-- Apply the saved colour-theme choice before first paint, so an explicit
         Light/Dark selection never flashes the wrong palette while the app
         bundle loads. First-party, inert: it only reads our own localStorage key
         and sets a data attribute. "system" (or no choice) is left to CSS. -->
    <script>
      try {
        var t = localStorage.getItem("postcards-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
