<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <!-- Send our ORIGIN (not the URL) as the Referer on cross-origin requests so the
         opt-in OpenStreetMap tile server accepts them ("Referer is required"). The
         hosted PWA also sets this via public/_headers; this meta covers the Vite
         dev/preview server and the Capacitor native webview, which never see _headers. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Startup fetches otherwise wait for the whole bundle to download and
         evaluate: preload the render-blocking reference JSONs (and the basemap
         geometry the map needs right after) so the network runs in parallel.
         %BASE_URL% matches the import.meta.env.BASE_URL the code fetches with;
         `crossorigin` (anonymous) matches fetch()'s default credentials mode so
         the preloaded response is consumed, not downloaded twice. On repeat
         visits these resolve from the service-worker cache and cost nothing. -->
    <link rel="preload" href="%BASE_URL%reference/cities.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%reference/airports.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%reference/subdivisions.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%reference/heritage.json" as="fetch" crossorigin />
    <link rel="preload" href="%BASE_URL%basemap/countries-50m.json" as="fetch" crossorigin />
    <meta name="theme-color" content="#4338ca" />
    <meta name="description" content="Remember the places you've been — private, offline, in a file you own." />
    <title>Postcards</title>
    <!-- Apply the saved colour-theme choice before first paint, so an explicit
         Light/Dark selection never flashes the wrong palette while the app
         bundle loads. First-party, inert: it only reads our own localStorage key
         and sets a data attribute. "system" (or no choice) is left to CSS. -->
    <script>
      try {
        var t = localStorage.getItem("postcards-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
