name: Deploy to GitHub Pages

# Builds the Postcards PWA and publishes it to GitHub Pages at
# https://<owner>.github.io/Postcards/. This job builds with the /Postcards/
# base path (VITE_BASE); local dev and the Capacitor native wrap keep base "/".

on:
  # Pages deploys from THIS branch, not main: the repo's `github-pages`
  # environment restricts deployments to claude/repo-setup-speckit-3magw3, so a
  # deploy from main is rejected at the environment gate. Finished changes are
  # mirrored here to publish:
  #   git push origin <sha>:refs/heads/claude/repo-setup-speckit-3magw3
  # To deploy straight from main instead, allow `main` under
  # Settings → Environments → github-pages → deployment branches, then set this
  # trigger to `main`.
  push:
    branches:
      - claude/repo-setup-speckit-3magw3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build (GitHub Pages subpath)
        run: pnpm --filter postcards build
        env:
          VITE_BASE: /Postcards/
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/postcards/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
